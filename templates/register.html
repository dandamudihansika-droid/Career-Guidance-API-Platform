{% extends 'layout.html' %}

{% block content %}
<section class="page-panel auth-panel">
  <div class="panel-heading">
    <h1>Create your account.</h1>
    <p>Register to unlock smart internship and career suggestions.</p>
  </div>
  <form class="form-card" method="post">
    <label>Full Name</label>
    <input type="text" name="name" placeholder="Alex Student" required />

    <label>Email</label>
    <input type="email" name="email" placeholder="student@example.com" required />

    <label>Password</label>
    <input type="password" name="password" placeholder="Choose a strong password" required />

    <button type="submit" class="button primary">Register</button>
    <p class="helper-text">
      Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
    </p>
  </form>
</section>
{% endblock %}
